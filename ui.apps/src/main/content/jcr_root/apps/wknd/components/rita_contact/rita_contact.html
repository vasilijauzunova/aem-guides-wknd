<sly data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html"/>
<sly data-sly-use.contact="com.adobe.aem.guides.wknd.core.models.RitaContactModel"/>
<h1 data-sly-test="${contact.title}">${contact.title}</h1>
<p>${contact.firstName}</p>
<p>${contact.lastName}</p>
<p>${contact.phoneNumber} <span data-sly-test="${contact.country}">(${contact.country})</span></p>
<p data-sly-test="${contact.email}">${contact.email}</p>
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=!contact.hasContent}"></sly>
