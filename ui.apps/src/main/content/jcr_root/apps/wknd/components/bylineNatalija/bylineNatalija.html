<div data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html"
     data-sly-use.model="com.adobe.aem.guides.wknd.core.models.BylineNatalija"
     class="cmp-byline-natalija">
    <div class="cmp-byline__image"
         data-sly-resource="${ '.' @ resourceType = 'core/wcm/components/image/v2/image' }">
    </div>
    <h2 class="cmp-byline__name-natalija">${model.name}</h2>
    <p class="cmp-byline__occupations-natalija">${model.occupations @ join=', '}</p>

</div>
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=!hasContent}"></sly>
